# Baseline Model Configuration for BurmeseGLUE

# Model settings
model:
  type: baseline  # baseline (TF-IDF + linear models)

  # Vectorizer settings
  vectorizer:
    type: tfidf  # tfidf or count
    max_features: 10000
    min_df: 2
    max_df: 0.95
    ngram_range: [1, 2]  # unigrams and bigrams
    analyzer: word
    sublinear_tf: true

  # Classifier settings (task-dependent)
  classifier:
    # For classification tasks (sentiment)
    logistic_regression:
      C: 1.0
      max_iter: 1000
      solver: lbfgs
      class_weight: balanced

    # For similarity tasks
    ridge_regression:
      alpha: 1.0
      max_iter: 1000

    # For NER tasks
    crf:
      algorithm: lbfgs
      c1: 0.1
      c2: 0.1
      max_iterations: 100

# Training settings
training:
  seed: 42
  verbose: true

# Data settings
data:
  data_dir: ./data
  cache_dir: ./data/cache
  max_length: 128  # Not used for TF-IDF but for consistency

# Task-specific settings
tasks:
  sentiment:
    metrics: [accuracy, f1_macro, precision_macro, recall_macro]

  ner:
    metrics: [span_f1, precision, recall]

  similarity:
    metrics: [pearson, spearman]

  qa:
    metrics: [exact_match, f1]
